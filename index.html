<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Honza | Angličtina Jednoduše</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0a0a0a;color:#fff;max-width:480px;margin:0 auto}
a{color:inherit;text-decoration:none}
.hero{padding:36px 24px 20px;text-align:center;border-bottom:0.5px solid #1e1e1e}
.avatar{width:90px;height:90px;border-radius:50%;border:3px solid #7F77DD;margin:0 auto 14px;overflow:hidden;background:#1a1a1a;display:flex;align-items:center;justify-content:center}
.avatar img{width:100%;height:100%;object-fit:cover}
.handle{font-size:12px;color:#7F77DD;letter-spacing:0.06em;margin-bottom:8px}
.badge-c2{display:inline-flex;align-items:center;gap:6px;background:#16152a;border:0.5px solid #2a2860;border-radius:20px;padding:4px 12px;font-size:11px;color:#AFA9EC;margin-bottom:14px}
.badge-dot{width:6px;height:6px;border-radius:50%;background:#7F77DD;flex-shrink:0}
h1{font-size:22px;font-weight:500;line-height:1.3;color:#fff;margin-bottom:8px}
.tagline{font-size:14px;color:#777;line-height:1.6}
.divider{height:0.5px;background:#1a1a1a}
.proof{display:flex;justify-content:space-around;padding:16px 24px}
.stat-n{font-size:17px;font-weight:500;color:#AFA9EC;text-align:center}
.stat-l{font-size:10px;color:#555;text-align:center;margin-top:2px}
.cta-block{padding:20px 24px}
.btn{display:block;width:100%;background:#7F77DD;color:#EEEDFE;font-size:15px;font-weight:500;padding:16px;border-radius:12px;text-align:center;border:none;cursor:pointer;margin-bottom:8px}
.btn:hover{background:#6b63c9}
.btn-details{text-align:center;font-size:11px;color:#555;display:flex;justify-content:center;gap:10px}
.dot{display:inline-block;width:3px;height:3px;border-radius:50%;background:#333;margin-top:4px}
.video-block{padding:0 24px 20px}
.video-wrap{position:relative;padding-bottom:56.25%;height:0;border-radius:12px;overflow:hidden;background:#111}
.video-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none}
.section{padding:20px 24px}
.section-label{font-size:10px;color:#534AB7;letter-spacing:0.1em;margin-bottom:14px}
.feature{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.icon{width:34px;height:34px;border-radius:9px;background:#16152a;border:0.5px solid #2a2860;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon svg{width:15px;height:15px;stroke:#7F77DD;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.ft{font-size:13px;font-weight:500;color:#e0e0e0;margin-bottom:2px}
